<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Garden Maze</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green-deep:   #1a3d0e;
  --green-mid:    #2d6a1a;
  --green-bright: #4a9e30;
  --gold:         #d4a43a;
  --cream:        #faf7ee;
  --cream-dark:   #f0ebda;
  --text:         #1e2e14;
  --text-mid:     #3d5428;
  --text-light:   #6a7e54;
  --red:          #c0392b;
  --panel:        rgba(255,252,240,0.98);
  --border:       #b8a870;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  background: linear-gradient(150deg, #e8f5dc 0%, #f5f0e0 50%, #eaf5d8 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow-x: hidden;
  overflow-y: auto;
}

/* Floating petals */
.petal {
  position: fixed;
  font-size: 1rem;
  opacity: 0;
  pointer-events: none;
  animation: fall linear infinite;
  z-index: 0;
}
@keyframes fall {
  0%   { transform: translateY(-30px) rotate(0deg); opacity:0; }
  5%   { opacity: 0.6; }
  95%  { opacity: 0.3; }
  100% { transform: translateY(100vh) rotate(360deg); opacity:0; }
}

/* NAV */
.top-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 5%;
  height: 60px;
  background: rgba(250,247,238,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(74,158,48,0.15);
  z-index: 100;
}
.nav-logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-weight: 900;
  color: var(--green-deep);
  text-decoration: none;
}
.nav-logo span { color: var(--gold); }
.nav-back {
  font-size: .82rem;
  color: var(--text-light);
  text-decoration: none;
  transition: color .2s;
}
.nav-back:hover { color: var(--green-mid); }

/* CARD */
.auth-card {
  background: var(--panel);
  border: 1.5px solid var(--border);
  border-radius: 24px;
  padding: 40px;
  width: 100%;
  max-width: 440px;
  box-shadow: 0 20px 60px rgba(0,0,0,.12), 0 0 0 6px rgba(200,184,112,.1);
  position: relative;
  z-index: 1;
  margin-top: 60px;
}

.auth-icon {
  text-align: center;
  font-size: 3rem;
  margin-bottom: 10px;
}
.auth-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  font-weight: 900;
  color: var(--green-deep);
  text-align: center;
  margin-bottom: 6px;
}
.auth-subtitle {
  text-align: center;
  color: var(--text-light);
  font-size: .88rem;
  margin-bottom: 28px;
  line-height: 1.6;
}

/* TABS */
.auth-tabs {
  display: flex;
  background: var(--cream-dark);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 24px;
  gap: 4px;
}
.auth-tab {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 9px;
  font-family: 'Playfair Display', serif;
  font-size: .88rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .25s;
  background: transparent;
  color: var(--text-light);
}
.auth-tab.active {
  background: white;
  color: var(--green-deep);
  box-shadow: 0 2px 8px rgba(0,0,0,.1);
}

/* GOOGLE BTN */
.btn-google {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 13px;
  background: white;
  border: 1.5px solid #e0d8c0;
  border-radius: 12px;
  font-size: .92rem;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  transition: all .2s;
  margin-bottom: 20px;
  font-family: 'DM Sans', sans-serif;
}
.btn-google:hover {
  border-color: var(--green-bright);
  box-shadow: 0 4px 14px rgba(0,0,0,.1);
  transform: translateY(-1px);
}
.google-icon {
  width: 20px; height: 20px;
  background: url('https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg') center/contain no-repeat;
}

/* DIVIDER */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  color: var(--text-light);
  font-size: .78rem;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #d8d0b0;
}

/* FORM */
.form-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 14px;
}
.form-label {
  font-size: .75rem;
  font-weight: 700;
  color: var(--text-mid);
  letter-spacing: .04em;
  text-transform: uppercase;
}
.form-input {
  background: var(--cream);
  border: 1.5px solid rgba(74,158,48,.2);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: .92rem;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  transition: border-color .2s, box-shadow .2s;
  outline: none;
}
.form-input:focus {
  border-color: var(--green-bright);
  box-shadow: 0 0 0 3px rgba(74,158,48,.1);
}
.form-input.error {
  border-color: var(--red);
  box-shadow: 0 0 0 3px rgba(192,57,43,.1);
}

/* PASSWORD WRAPPER */
.pass-wrap { position: relative; }
.pass-wrap .form-input { padding-right: 44px; width: 100%; }
.pass-toggle {
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 1rem;
  color: var(--text-light);
  user-select: none;
}

/* ERROR MSG */
.error-msg {
  background: #fde8e0;
  border: 1px solid #e0a0a0;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: .82rem;
  color: var(--red);
  margin-bottom: 14px;
  display: none;
}
.error-msg.show { display: block; }

/* SUCCESS MSG */
.success-msg {
  background: #e8f8e0;
  border: 1px solid #a0d890;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: .82rem;
  color: var(--green-mid);
  margin-bottom: 14px;
  display: none;
  text-align: center;
}
.success-msg.show { display: block; }

/* SUBMIT BTN */
.btn-submit {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--green-mid), var(--green-bright));
  color: white;
  border: none;
  border-radius: 12px;
  font-size: .95rem;
  font-weight: 700;
  font-family: 'Playfair Display', serif;
  cursor: pointer;
  transition: all .2s;
  box-shadow: 0 4px 14px rgba(45,106,26,.3);
  margin-top: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-submit:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(45,106,26,.4);
}
.btn-submit:disabled {
  opacity: .6;
  cursor: not-allowed;
  transform: none;
}

/* SPINNER */
.spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,.4);
  border-top-color: white;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* FORGOT PASSWORD */
.forgot-link {
  text-align: right;
  margin-top: -8px;
  margin-bottom: 14px;
}
.forgot-link a {
  font-size: .78rem;
  color: var(--text-light);
  text-decoration: none;
  transition: color .2s;
}
.forgot-link a:hover { color: var(--green-mid); }

/* TERMS */
.terms {
  font-size: .74rem;
  color: var(--text-light);
  text-align: center;
  margin-top: 16px;
  line-height: 1.6;
}
.terms a { color: var(--green-mid); text-decoration: none; }

/* PASSWORD STRENGTH */
.strength-bar {
  height: 4px;
  border-radius: 2px;
  background: #e0d8c0;
  margin-top: 6px;
  overflow: hidden;
  display: none;
}
.strength-fill {
  height: 100%;
  border-radius: 2px;
  transition: width .3s, background .3s;
  width: 0%;
}
.strength-text {
  font-size: .7rem;
  margin-top: 3px;
  display: none;
}

/* LOADING OVERLAY */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(250,247,238,.9);
  backdrop-filter: blur(4px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s;
}
.loading-overlay.show { opacity: 1; pointer-events: all; }
.loading-icon { font-size: 3rem; animation: bounce 1s ease-in-out infinite alternate; margin-bottom: 14px; }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-12px)} }
.loading-text { font-family:'Playfair Display',serif; color:var(--green-deep); font-size:1rem; }
.pass-toggle svg {
  color: var(--text-light);
  display: block;
  transition: color .2s;
}
.pass-toggle:hover svg {
  color: var(--green-mid);
}
input[type="password"]::-ms-reveal,
input[type="password"]::-ms-clear,
input::-webkit-credentials-auto-fill-button,
input[type="password"]::-webkit-textfield-decoration-container {
  display: none !important;
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="top-nav">
  <a href="index.html" class="nav-logo">🌿 Garden <span>Maze</span></a>
  <a href="index.html" class="nav-back">← Back to Home</a>
</nav>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-icon">🌿</div>
  <div class="loading-text">Entering the garden...</div>
</div>

<!-- AUTH CARD -->
<div class="auth-card">
  <div class="auth-icon">🏰</div>
  <div class="auth-title">Welcome Back</div>
  <div class="auth-subtitle">Sign in to track your progress,<br>earn coins and climb the leaderboard</div>

  <!-- TABS -->
  <div class="auth-tabs">
    <button class="auth-tab active" id="tabSignIn" onclick="switchTab('signin')">Sign In</button>
    <button class="auth-tab" id="tabSignUp" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <!-- GOOGLE -->
  <button class="btn-google" onclick="signInWithGoogle()">
    <div class="google-icon"></div>
    Continue with Google
  </button>

  <div class="divider">or</div>

  <!-- ERROR / SUCCESS -->
  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <!-- SIGN IN FORM -->
  <div id="formSignIn">
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" type="email" id="siEmail" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="pass-wrap">
        <input class="form-input" type="password" id="siPass" placeholder="Your password" autocomplete="current-password">
        <span class="pass-toggle" onclick="togglePass('siPass', this)">
          <svg id="eyeIcon_siPass" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </span>
      </div>
    </div>
    <div class="forgot-link"><a href="#" onclick="forgotPassword()">Forgot password?</a></div>
    <button class="btn-submit" id="btnSignIn" onclick="signInWithEmail()">
      <span>Sign In to Garden</span>
      <div class="spinner" id="spinSignIn"></div>
    </button>
  </div>

  <!-- SIGN UP FORM -->
  <div id="formSignUp" style="display:none">
    <div class="form-group">
      <label class="form-label">Your Name</label>
      <input class="form-input" type="text" id="suName" placeholder="your name" autocomplete="name">
    </div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" type="email" id="suEmail" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="pass-wrap">
        <input class="form-input" type="password" id="suPass" placeholder="Min 6 characters" autocomplete="new-password" oninput="checkStrength(this.value)">
        <span class="pass-toggle" onclick="togglePass('suPass', this)">
          <svg id="eyeIcon_suPass" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </span>
      </div>
      <div class="strength-bar" id="strengthBar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-text" id="strengthText"></div>
    </div>
    <button class="btn-submit" id="btnSignUp" onclick="signUpWithEmail()">
      <span>Create My Account</span>
      <div class="spinner" id="spinSignUp"></div>
    </button>
    <div class="terms">
      By signing up you agree to our
      <a href="#">Privacy Policy</a> —
      we only collect your email and game progress.
      We never share your data.
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- Your Firebase Config -->
<script src="firebase-config.js"></script>

<script>
// ── TAB SWITCHING ──────────────────────────────────────────
function switchTab(tab){
  const isSignIn = tab === 'signin';
  document.getElementById('tabSignIn').className = 'auth-tab' + (isSignIn ? ' active' : '');
  document.getElementById('tabSignUp').className = 'auth-tab' + (!isSignIn ? ' active' : '');
  document.getElementById('formSignIn').style.display = isSignIn ? 'block' : 'none';
  document.getElementById('formSignUp').style.display = isSignIn ? 'none' : 'block';
  document.querySelector('.auth-title').textContent = isSignIn ? 'Welcome Back' : 'Join the Garden';
  document.querySelector('.auth-subtitle').textContent = isSignIn
    ? 'Sign in to track your progress,\nearn coins and climb the leaderboard'
    : 'Create your account and start your\nbrain training journey today';
  clearMessages();
}

// ── SHOW/HIDE ERROR & SUCCESS ──────────────────────────────
function showError(msg){
  const el = document.getElementById('errorMsg');
  el.textContent = '⚠️ ' + msg;
  el.className = 'error-msg show';
  document.getElementById('successMsg').className = 'success-msg';
}
function showSuccess(msg){
  const el = document.getElementById('successMsg');
  el.textContent = '✅ ' + msg;
  el.className = 'success-msg show';
  document.getElementById('errorMsg').className = 'error-msg';
}
function clearMessages(){
  document.getElementById('errorMsg').className = 'error-msg';
  document.getElementById('successMsg').className = 'success-msg';
}

// ── LOADING ────────────────────────────────────────────────
function setLoading(btnId, spinId, loading){
  const btn = document.getElementById(btnId);
  const spin = document.getElementById(spinId);
  btn.disabled = loading;
  spin.style.display = loading ? 'block' : 'none';
}
function showLoadingOverlay(){ document.getElementById('loadingOverlay').className = 'loading-overlay show'; }

// ── PASSWORD TOGGLE ────────────────────────────────────────
function togglePass(inputId, iconSpan){
  const inp = document.getElementById(inputId);
  const isHidden = inp.type === 'password';
  inp.type = isHidden ? 'text' : 'password';

  // SVG eye open
  const eyeOpen = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;

  // SVG eye closed (slash through it)
  const eyeClosed = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

  iconSpan.innerHTML = isHidden ? eyeClosed : eyeOpen;
}

// ── PASSWORD STRENGTH ──────────────────────────────────────
function checkStrength(val){
  const bar = document.getElementById('strengthBar');
  const fill = document.getElementById('strengthFill');
  const txt = document.getElementById('strengthText');
  bar.style.display = val.length ? 'block' : 'none';
  txt.style.display = val.length ? 'block' : 'none';
  let score = 0;
  if(val.length >= 6)  score++;
  if(val.length >= 10) score++;
  if(/[A-Z]/.test(val)) score++;
  if(/[0-9]/.test(val)) score++;
  if(/[^A-Za-z0-9]/.test(val)) score++;
  const levels = [
    { pct:'20%', color:'#c0392b', label:'Very weak' },
    { pct:'40%', color:'#e67e22', label:'Weak' },
    { pct:'60%', color:'#f1c40f', label:'Fair' },
    { pct:'80%', color:'#27ae60', label:'Strong' },
    { pct:'100%',color:'#1a7a40', label:'Very strong' },
  ];
  const l = levels[Math.min(score, 4)];
  fill.style.width = l.pct;
  fill.style.background = l.color;
  txt.style.color = l.color;
  txt.textContent = l.label;
}

// ── FIREBASE ERROR MESSAGES ────────────────────────────────
function friendlyError(code){
  const map = {
    'auth/user-not-found':       'No account found with this email.',
    'auth/wrong-password':       'Incorrect password. Try again.',
    'auth/email-already-in-use': 'An account already exists with this email.',
    'auth/weak-password':        'Password must be at least 6 characters.',
    'auth/invalid-email':        'Please enter a valid email address.',
    'auth/too-many-requests':    'Too many attempts. Please try again later.',
    'auth/network-request-failed': 'Network error. Check your connection.',
    'auth/popup-closed-by-user': 'Google sign-in was cancelled.',
    'auth/invalid-credential':   'Incorrect email or password.',
    'auth/missing-password':     'Please enter your password.', 
  };
  return map[code] || 'Something went wrong. Please try again.';
}

// ── SAVE USER TO FIRESTORE ─────────────────────────────────
async function saveUserToDatabase(user, displayName=''){
  try {
    const userRef = db.collection('users').doc(user.uid);
    const doc = await userRef.get();
    if(!doc.exists){
      // New user — create their profile
      await userRef.set({
        uid:          user.uid,
        name:         displayName || user.displayName || 'Garden Explorer',
        email:        user.email,
        coins:        100,
        puzzlesSolved: 0,
        gamesPlayed:  0,
        joinedAt:     firebase.firestore.FieldValue.serverTimestamp(),
        lastPlayed:   firebase.firestore.FieldValue.serverTimestamp(),
        provider:     user.providerData[0]?.providerId || 'email',
      });
      // Also add to leaderboard
      await db.collection('leaderboard').doc(user.uid).set({
        uid:          user.uid,
        name:         displayName || user.displayName || 'Garden Explorer',
        coins:        100,
        puzzlesSolved: 0,
        updatedAt:    firebase.firestore.FieldValue.serverTimestamp(),
      });
      console.log('✅ New user profile created in database');
    } else {
      // Existing user — update last login time
      await userRef.update({
        lastPlayed: firebase.firestore.FieldValue.serverTimestamp(),
      });
      console.log('✅ Existing user — last login updated');
    }
  } catch(err){
    console.error('Database error:', err);
  }
}

// ── REDIRECT AFTER LOGIN ───────────────────────────────────
function redirectAfterLogin(user){
  showLoadingOverlay();
  // Store user info in sessionStorage for the game to use
  sessionStorage.setItem('gm_uid',   user.uid);
  sessionStorage.setItem('gm_name',  user.displayName || user.email.split('@')[0]);
  sessionStorage.setItem('gm_email', user.email);
  // Redirect to play page after short delay
  setTimeout(()=>{ window.location.href = 'play.html'; }, 1200);
}

// ── GOOGLE SIGN IN ─────────────────────────────────────────
async function signInWithGoogle(){
  clearMessages();
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    const result = await auth.signInWithPopup(provider);
    const user = result.user;
    await saveUserToDatabase(user);
    showSuccess(`Welcome, ${user.displayName}! 🌿`);
    redirectAfterLogin(user);
  } catch(err){
    showError(friendlyError(err.code));
  }
}

// ── EMAIL SIGN IN ──────────────────────────────────────────
async function signInWithEmail(){
  clearMessages();
  const email = document.getElementById('siEmail').value.trim();
  const pass  = document.getElementById('siPass').value;
  if(!email){ showError('Please enter your email.'); return; }
  if(!pass){  showError('Please enter your password.'); return; }
  setLoading('btnSignIn', 'spinSignIn', true);
  try {
    const result = await auth.signInWithEmailAndPassword(email, pass);
    await saveUserToDatabase(result.user);
    showSuccess('Signed in! Entering the garden... 🌿');
    redirectAfterLogin(result.user);
  } catch(err){
    showError(friendlyError(err.code));
    setLoading('btnSignIn', 'spinSignIn', false);
  }
}

// ── EMAIL SIGN UP ──────────────────────────────────────────
async function signUpWithEmail(){
  clearMessages();
  const name  = document.getElementById('suName').value.trim();
  const email = document.getElementById('suEmail').value.trim();
  const pass  = document.getElementById('suPass').value;
  if(!name){  showError('Please enter your name.'); return; }
  if(!email){ showError('Please enter your email.'); return; }
  if(!pass || pass.length < 6){ showError('Password must be at least 6 characters.'); return; }
  setLoading('btnSignUp', 'spinSignUp', true);
  try {
    const result = await auth.createUserWithEmailAndPassword(email, pass);
    // Update display name
    await result.user.updateProfile({ displayName: name });
    // Send verification email
    await result.user.sendEmailVerification();
    // Save to database
    await saveUserToDatabase(result.user, name);
    showSuccess(`Welcome, ${name}! Check your email to verify your account. 🌿`);
    redirectAfterLogin(result.user);
  } catch(err){
    showError(friendlyError(err.code));
    setLoading('btnSignUp', 'spinSignUp', false);
  }
}

// ── FORGOT PASSWORD ────────────────────────────────────────
async function forgotPassword(){
  const email = document.getElementById('siEmail').value.trim();
  if(!email){ showError('Enter your email, then click Forgot Password.'); return; }
  try {
    await auth.sendPasswordResetEmail(email);
    showSuccess('Password reset email sent! Check your inbox. 🌿');
  } catch(err){
    showError(friendlyError(err.code));
  }
}

// ── CHECK IF ALREADY LOGGED IN ─────────────────────────────
auth.onAuthStateChanged(user => {
  if(user){
    // Already logged in — redirect straight to play
    console.log('Already logged in:', user.email);
    redirectAfterLogin(user);
  }
});

// ── FLOATING PETALS ───────────────────────────────────────
const petals = ['🌸','🌺','🍃','🌼','🌿','🍂'];
for(let i=0; i<12; i++){
  const p = document.createElement('div');
  p.className = 'petal';
  p.textContent = petals[Math.floor(Math.random()*petals.length)];
  p.style.cssText = `left:${Math.random()*100}%;animation-duration:${12+Math.random()*12}s;animation-delay:${Math.random()*12}s;font-size:${.7+Math.random()*.6}rem`;
  document.body.appendChild(p);
}

// ── ENTER KEY SUPPORT ──────────────────────────────────────
document.addEventListener('keydown', e => {
  if(e.key !== 'Enter') return;
  const signInVisible = document.getElementById('formSignIn').style.display !== 'none';
  if(signInVisible) signInWithEmail();
  else signUpWithEmail();
});
</script>
