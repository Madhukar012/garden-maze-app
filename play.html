<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play — Garden Maze</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:#1a3d0e; font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; flex-direction:column; }
.play-nav{
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px; height:56px;
  background:rgba(10,24,6,0.9); backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  flex-shrink:0;
}
.play-nav a{
  font-family:'Playfair Display',serif; font-size:1rem; font-weight:900;
  color:white; text-decoration:none; display:flex; align-items:center; gap:7px;
}
.play-nav a span{ color:#d4a43a; }
.nav-right{ display:flex; align-items:center; gap:14px; }
.back-btn{
  color:rgba(255,255,255,0.6); text-decoration:none; font-size:.82rem;
  display:flex; align-items:center; gap:5px; transition:color .2s;
}
.back-btn:hover{ color:white; }
.user-chip{
  display:flex; align-items:center; gap:7px;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15);
  border-radius:20px; padding:5px 12px; font-size:.78rem; color:rgba(255,255,255,.8);
  text-decoration:none; transition:all .2s;
}
.user-chip:hover{ background:rgba(255,255,255,.14); color:white; }
.user-avatar{
  width:22px; height:22px; border-radius:50%;
  background:linear-gradient(135deg,#2d6a1a,#4a9e30);
  display:flex; align-items:center; justify-content:center;
  font-size:.7rem; font-weight:700; color:white;
}
.btn-login{
  background:linear-gradient(135deg,#2d6a1a,#4a9e30); color:white;
  padding:6px 14px; border-radius:20px; font-size:.78rem;
  text-decoration:none; transition:all .2s;
}
.btn-login:hover{ opacity:.9; }
.game-frame{
  flex:1; display:flex; align-items:center; justify-content:center;
  padding:16px;
}
iframe{
  width:100%; max-width:1000px; height:calc(100vh - 100px);
  border:none; border-radius:14px;
  box-shadow:0 20px 60px rgba(0,0,0,.5), 0 0 0 2px rgba(74,158,48,.3);
}
</style>
</head>
<body>
<nav class="play-nav">
  <a href="index.html">🌿 Garden <span>Maze</span></a>
  <div class="nav-right">
    <!-- User name display — no link, just shows who is logged in -->
    <div class="user-chip" id="userChip" style="display:none">
      <div class="user-avatar" id="userAvatar">?</div>
      <span id="userName">Player</span>
    </div>
    <!-- Shown when logged out -->
    <a href="login.html" class="btn-login" id="loginBtn">Sign In</a>
    <a href="index.html" class="back-btn">🏠 Home</a>
  </div>
</nav>
<div class="game-frame">
  <iframe src="game/garden-maze-v3.html" title="Garden Maze Game" allowfullscreen></iframe>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
auth.onAuthStateChanged(user => {
  if(user){
    // Show user chip, hide login button
    document.getElementById('userChip').style.display = 'flex';
    document.getElementById('loginBtn').style.display = 'none';
    // Set avatar and name
    const name = user.displayName || user.email.split('@')[0];
    document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
    document.getElementById('userName').textContent   = name.split(' ')[0];
  } else {
    document.getElementById('userChip').style.display = 'none';
    document.getElementById('loginBtn').style.display = 'block';
  }
});
</script>
</body>
</html>
