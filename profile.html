<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Garden — Garden Maze</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green-deep:   #1a3d0e;
  --green-mid:    #2d6a1a;
  --green-bright: #4a9e30;
  --gold:         #d4a43a;
  --cream:        #faf7ee;
  --cream-dark:   #f0ebda;
  --text:         #1e2e14;
  --text-mid:     #3d5428;
  --text-light:   #6a7e54;
  --red:          #c0392b;
  --panel:        rgba(255,252,240,0.98);
  --border:       #b8a870;
  --green-ok:     #27ae60;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  background:linear-gradient(150deg,#e8f5dc 0%,#f5f0e0 50%,#eaf5d8 100%);
  padding-bottom: 40px;
}

/* NAV */
nav{
  display:flex; align-items:center; justify-content:space-between;
  padding:0 5%; height:64px;
  background:rgba(250,247,238,0.95); backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(74,158,48,0.15);
  position:sticky; top:0; z-index:100;
}
.nav-logo{ font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:900; color:var(--green-deep); text-decoration:none; }
.nav-logo span{ color:var(--gold); }
.nav-right{ display:flex; gap:12px; align-items:center; }
.nav-link{ font-size:.82rem; color:var(--text-light); text-decoration:none; transition:color .2s; }
.nav-link:hover{ color:var(--green-mid); }
.btn-signout{
  background:transparent; border:1.5px solid #e0c0b0; color:#c07060;
  padding:6px 14px; border-radius:20px; font-size:.78rem; cursor:pointer;
  font-family:'DM Sans',sans-serif; transition:all .2s;
}
.btn-signout:hover{ border-color:var(--red); color:var(--red); }

/* MAIN */
.main{ max-width:900px; margin:0 auto; padding:32px 20px; }

/* PROFILE HEADER */
.profile-header{
  background:var(--panel); border:1.5px solid var(--border);
  border-radius:20px; padding:28px 32px;
  display:flex; align-items:center; gap:24px;
  box-shadow:0 6px 24px rgba(0,0,0,.08);
  margin-bottom:24px; flex-wrap:wrap;
}
.avatar{
  width:72px; height:72px; border-radius:50%;
  background:linear-gradient(135deg,var(--green-mid),var(--green-bright));
  display:flex; align-items:center; justify-content:center;
  font-size:2rem; flex-shrink:0;
  box-shadow:0 4px 14px rgba(45,106,26,.3);
}
.profile-info{ flex:1; }
.profile-name{ font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:900; color:var(--green-deep); margin-bottom:4px; }
.profile-email{ font-size:.85rem; color:var(--text-light); margin-bottom:8px; }
.profile-badge{
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(74,158,48,.1); border:1px solid rgba(74,158,48,.3);
  border-radius:20px; padding:4px 12px; font-size:.75rem;
  color:var(--green-mid); font-weight:700;
}
.btn-play{
  background:linear-gradient(135deg,var(--green-mid),var(--green-bright));
  color:white; border:none; padding:12px 28px; border-radius:28px;
  font-family:'Playfair Display',serif; font-size:.9rem; font-weight:700;
  cursor:pointer; transition:all .2s; text-decoration:none;
  box-shadow:0 4px 14px rgba(45,106,26,.3);
  display:inline-flex; align-items:center; gap:8px;
}
.btn-play:hover{ transform:translateY(-1px); box-shadow:0 6px 20px rgba(45,106,26,.4); }

/* STATS GRID */
.stats-grid{
  display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:14px; margin-bottom:24px;
}
.stat-card{
  background:var(--panel); border:1.5px solid var(--border);
  border-radius:16px; padding:20px;
  box-shadow:0 4px 14px rgba(0,0,0,.07);
  text-align:center; transition:transform .2s;
}
.stat-card:hover{ transform:translateY(-2px); }
.stat-icon{ font-size:2rem; margin-bottom:8px; display:block; }
.stat-value{ font-family:'Playfair Display',serif; font-size:2rem; font-weight:900; color:var(--green-deep); line-height:1; margin-bottom:4px; }
.stat-label{ font-size:.75rem; color:var(--text-light); text-transform:uppercase; letter-spacing:.06em; font-weight:700; }

/* PROGRESS SECTION */
.section-title{
  font-family:'Playfair Display',serif; font-size:1.2rem;
  font-weight:700; color:var(--green-deep); margin-bottom:14px;
  display:flex; align-items:center; gap:8px;
}

.puzzle-progress{
  background:var(--panel); border:1.5px solid var(--border);
  border-radius:16px; padding:24px;
  box-shadow:0 4px 14px rgba(0,0,0,.07);
  margin-bottom:24px;
}
.puzzle-row{
  display:flex; align-items:center; gap:14px;
  padding:10px 0; border-bottom:1px solid #e8e0c8;
}
.puzzle-row:last-child{ border-bottom:none; }
.puzzle-icon{ font-size:1.4rem; width:36px; text-align:center; flex-shrink:0; }
.puzzle-info{ flex:1; }
.puzzle-name{ font-size:.92rem; font-weight:500; color:var(--text); margin-bottom:3px; }
.puzzle-diff{ font-size:.72rem; color:var(--text-light); text-transform:uppercase; letter-spacing:.06em; }
.puzzle-status{
  font-size:.78rem; font-weight:700; padding:4px 12px;
  border-radius:20px; flex-shrink:0;
}
.puzzle-status.solved{ background:#e8f8e0; color:var(--green-ok); border:1px solid #a0d890; }
.puzzle-status.pending{ background:#f8f4e8; color:var(--gold); border:1px solid #d4b870; }

/* LEADERBOARD */
.leaderboard{
  background:var(--panel); border:1.5px solid var(--border);
  border-radius:16px; padding:24px;
  box-shadow:0 4px 14px rgba(0,0,0,.07);
  margin-bottom:24px;
}
.lb-row{
  display:flex; align-items:center; gap:14px;
  padding:10px 0; border-bottom:1px solid #e8e0c8;
  transition:background .15s; border-radius:8px; padding:10px;
}
.lb-row:last-child{ border-bottom:none; }
.lb-row.me{ background:rgba(74,158,48,.06); border:1px solid rgba(74,158,48,.2); border-radius:10px; }
.lb-rank{
  font-family:'Playfair Display',serif; font-size:1.1rem;
  font-weight:900; color:var(--text-light); width:32px;
  text-align:center; flex-shrink:0;
}
.lb-rank.gold{ color:#d4a43a; }
.lb-rank.silver{ color:#a0a0b0; }
.lb-rank.bronze{ color:#b87040; }
.lb-avatar{
  width:36px; height:36px; border-radius:50%;
  background:linear-gradient(135deg,var(--green-mid),var(--green-bright));
  display:flex; align-items:center; justify-content:center;
  font-size:1rem; flex-shrink:0;
}
.lb-name{ flex:1; font-size:.9rem; font-weight:500; color:var(--text); }
.lb-coins{
  font-family:'Playfair Display',serif; font-size:.9rem;
  font-weight:700; color:var(--gold);
}
.lb-solved{ font-size:.78rem; color:var(--text-light); margin-left:10px; }

/* LOADING */
.loading-row{
  text-align:center; padding:20px; color:var(--text-light);
  font-style:italic; font-size:.9rem;
}

/* EMPTY STATE */
.empty-state{
  text-align:center; padding:32px 20px;
  color:var(--text-light); font-style:italic;
}
.empty-state .icon{ font-size:2.5rem; margin-bottom:10px; display:block; }

@media(max-width:600px){
  .profile-header{ flex-direction:column; text-align:center; }
  .stats-grid{ grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">🌿 Garden <span>Maze</span></a>
  <div class="nav-right">
    <a href="play.html" class="nav-link">🎮 Play</a>
    <button class="btn-signout" onclick="signOut()">Sign Out</button>
  </div>
</nav>

<div class="main">

  <!-- PROFILE HEADER -->
  <div class="profile-header">
    <div class="avatar" id="avatarEmoji">🧙</div>
    <div class="profile-info">
      <div class="profile-name" id="profileName">Loading...</div>
      <div class="profile-email" id="profileEmail"></div>
      <div class="profile-badge">🌱 Garden Explorer</div>
    </div>
    <a href="play.html" class="btn-play">🎮 Play Now</a>
  </div>

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card">
      <span class="stat-icon">🪙</span>
      <div class="stat-value" id="statCoins">—</div>
      <div class="stat-label">Total Coins</div>
    </div>
    <div class="stat-card">
      <span class="stat-icon">✅</span>
      <div class="stat-value" id="statSolved">—</div>
      <div class="stat-label">Puzzles Solved</div>
    </div>
    <div class="stat-card">
      <span class="stat-icon">📅</span>
      <div class="stat-value" id="statJoined">—</div>
      <div class="stat-label">Member Since</div>
    </div>
  </div>

  <!-- PUZZLE PROGRESS -->
  <div class="puzzle-progress">
    <div class="section-title">🌸 Puzzle Progress</div>
    <div id="puzzleList">
      <div class="loading-row">Loading your progress...</div>
    </div>
  </div>

  <!-- LEADERBOARD PREVIEW -->
  <div class="leaderboard">
    <div class="section-title">🏆 Top Players</div>
    <div id="leaderboardList">
      <div class="loading-row">Loading leaderboard...</div>
    </div>
  </div>

</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script>

const isDev = window.location.hostname === 'localhost' ||
              window.location.hostname === '127.0.0.1';
const log = {
  info:  (...args) => { if(isDev) console.log('ℹ️', ...args); },
  ok:    (...args) => { if(isDev) console.log('✅', ...args); },
  warn:  (...args) => { if(isDev) console.warn('⚠️', ...args); },
  error: (...args) => { if(isDev) console.error('❌', ...args); },
};

const PUZZLES = [
  { icon:'🌸', name:'The Whispering Flowers', diff:'Easy',        key:'pattern'    },
  { icon:'🦋', name:'The Butterfly Garden',   diff:'Easy-Medium', key:'memory'     },
  { icon:'🌿', name:'The Twisted Vines',      diff:'Medium',      key:'anagram'    },
  { icon:'🌻', name:'The Hidden Blooms',       diff:'Medium',      key:'wordsearch' },
  { icon:'⛲', name:"The Oracle's Fountain",  diff:'Hard',        key:'logic'      },
];

// ── AUTH GUARD ─────────────────────────────────────────────
auth.onAuthStateChanged(async user => {
  if(!user){
    window.location.href = 'login.html';
    return;
  }
  loadProfile(user);
  loadLeaderboard(user.uid);
});

// ── LOAD PROFILE ───────────────────────────────────────────
async function loadProfile(user){
  document.getElementById('profileName').textContent  = user.displayName || 'Garden Explorer';
  document.getElementById('profileEmail').textContent = user.email;

  // Set avatar letter
  const name = user.displayName || user.email;
  document.getElementById('avatarEmoji').textContent = name.charAt(0).toUpperCase();

  try {
    const doc = await db.collection('users').doc(user.uid).get();
    if(doc.exists){
      const data = doc.data();

      // Stats
      document.getElementById('statCoins').textContent  = data.coins || 100;
      document.getElementById('statSolved').textContent = (data.puzzlesSolved || 0) + '/5';

      // Join date
      if(data.joinedAt){
        const d = data.joinedAt.toDate();
        document.getElementById('statJoined').textContent = d.toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'});
      }

      // Badge based on progress
      const solved = data.puzzlesSolved || 0;
      const badges = ['🌱 Seedling','🌿 Explorer','🌸 Solver','🌻 Champion','🏆 Garden Master'];
      document.querySelector('.profile-badge').textContent = badges[Math.min(solved, 4)];

      // Puzzle progress
      renderPuzzleProgress(data.solvedPuzzles || []);
    }
  } catch(err){
    log.error('Error loading profile:', err);
  }
}

// ── RENDER PUZZLE PROGRESS ─────────────────────────────────
function renderPuzzleProgress(solvedList){
  const container = document.getElementById('puzzleList');
  container.innerHTML = PUZZLES.map(p => {
    const isSolved = solvedList.includes(p.key);
    return `
      <div class="puzzle-row">
        <div class="puzzle-icon">${p.icon}</div>
        <div class="puzzle-info">
          <div class="puzzle-name">${p.name}</div>
          <div class="puzzle-diff">${p.diff}</div>
        </div>
        <div class="puzzle-status ${isSolved?'solved':'pending'}">
          ${isSolved ? '✅ Solved' : '⏳ Pending'}
        </div>
      </div>
    `;
  }).join('');
}

// ── LOAD LEADERBOARD ───────────────────────────────────────
async function loadLeaderboard(myUid){
  try {
    const snap = await db.collection('leaderboard')
      .orderBy('coins', 'desc')
      .limit(10)
      .get();

    if(snap.empty){
      document.getElementById('leaderboardList').innerHTML =
        '<div class="empty-state"><span class="icon">🌱</span>No players yet — be the first!</div>';
      return;
    }

    const medals = ['🥇','🥈','🥉'];
    const rankClass = ['gold','silver','bronze'];

    document.getElementById('leaderboardList').innerHTML = snap.docs.map((doc, i) => {
      const d = doc.data();
      const isMe = doc.id === myUid;
      const rank = i < 3 ? `<span class="lb-rank ${rankClass[i]}">${medals[i]}</span>`
                          : `<span class="lb-rank">${i+1}</span>`;
      return `
        <div class="lb-row ${isMe?'me':''}">
          ${rank}
          <div class="lb-avatar">${(d.name||'?').charAt(0).toUpperCase()}</div>
          <div class="lb-name">${d.name || 'Explorer'}${isMe?' (You)':''}</div>
          <div class="lb-coins">🪙 ${d.coins || 0}</div>
          <div class="lb-solved">${d.puzzlesSolved || 0}/5</div>
        </div>
      `;
    }).join('');
  } catch(err){
    log.error('Leaderboard error:', err);
    document.getElementById('leaderboardList').innerHTML =
      '<div class="empty-state"><span class="icon">⚠️</span>Could not load leaderboard.</div>';
  }
}

// ── SIGN OUT ───────────────────────────────────────────────
async function signOut(){
  await auth.signOut();
  sessionStorage.clear();
  window.location.href = 'index.html';
}
</script>
</body>
</html>
